name: Run Alerts Microservice Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Flask microservice
        run: |
          nohup python app.py &
        env:
          FLASK_ENV: testing

      - name: Wait for service to start
        run: sleep 5

      - name: Run test file
        run: python test_alerts.py
